replicaCount: 1

image:
  repository: ghcr.io/hierynomus/susecon-beer-agent
  tag: main
  pullPolicy: Always

# imagePullSecrets:
#   - name: ghcr-pull-secret

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: traefik
  host: susecon-beer-agent.example.com

  # TLS is opt-in. Set tls.enabled: true to add a TLS block to the Ingress.
  # Set tls.certManager.enabled: true to let cert-manager issue the certificate
  # automatically via a ClusterIssuer (e.g. Let's Encrypt).
  tls:
    enabled: false
    # Name of the Kubernetes TLS secret. Defaults to <fullname>-tls when empty.
    secretName: ""
    certManager:
      enabled: false
      clusterIssuer: letsencrypt-prod

# Rancher authentication
rancherAuth:
  # Global role required to use the beer ordering service
  requiredRole: susecon-beer
  # Set to "false" to skip TLS verification when calling the Rancher API
  tlsVerify: "false"

resources:
  limits:
    cpu: 200m
    memory: 64Mi
  requests:
    cpu: 50m
    memory: 32Mi

# Extra environment variables passed to the container
env: []
# - name: RUST_LOG
#   value: debug

livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
